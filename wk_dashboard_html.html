function setRegion(r) {

  document.querySelectorAll('.region-btn').forEach(b => b.classList.toggle('active', b.dataset.r === r));
  updateKPIs();
  renderAll();
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(t) || (t==='overview'&&b.textContent==='Overview')||(t==='competitors'&&b.textContent==='Competidores')||(t==='features'&&b.textContent==='Feature matrix')||(t==='strategy'&&b.textContent==='Estrategia')));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

function setComp(i) {
  currentComp = i;
  renderCompetitors();
}

function updateKPIs() {
  const d = DATA[currentRegion];
  document.getElementById('kpiSize').textContent = d.marketSize;
  document.getElementById('kpiCagr').textContent = d.cagr;
  document.getElementById('kpiShare').textContent = d.wk.shareEst;
  document.getElementById('kpiRev').textContent = d.wk.revEst;
}

}

  const d = DATA[currentRegion];
  document.getElementById('tab-overview').innerHTML = `
    <div class="two-col">
      <div class="card">
        <div class="card-label">Productos WK en el mercado</div>
        <div>${d.wk.products.map(p=>`<span class="tag">${p}</span>`).join('')}</div>
        <div style="margin-top:14px;font-size:12px;color:#888">Modelo de precios</div>
        <div style="font-size:13px;margin-top:2px">${d.wk.model}</div>
        <div style="margin-top:10px;font-size:12px;color:#888">Madurez digital del mercado</div>
        ${maturityDots(d.maturity)}
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="strength-card" style="flex:1">
          <div class="strength-title">Fortalezas</div>
          ${d.wk.strengths.map(s=>`<div class="side-bar-green">${s}</div>`).join('')}
        </div>
        <div class="weakness-card" style="flex:1">
          <div class="weakness-title">Debilidades</div>
          ${d.wk.weaknesses.map(s=>`<div class="side-bar-red">${s}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Movimientos estratégicos recientes</div>
      ${d.wk.recentMoves.map(m=>`<span class="move-tag">&#8594; ${m}</span>`).join('')}
    </div>`;
}

function renderCompetitors() {
  const d = DATA[currentRegion];
  const c = d.competitors[currentComp];
  document.getElementById('tab-competitors').innerHTML = `
    <div class="comp-bar">
      ${d.competitors.map((cp,i)=>`<button class="comp-btn${i===currentComp?' active':''}" onclick="setComp(${i})">${cp.name}</button>`).join('')}
    </div>
    <div class="comp-grid">
      ${[['Productos',c.products],['Usuario objetivo',c.target],['Share est.',c.share],['Revenue est.',c.rev],['Crecimiento YoY',c.growth],['Modelo de precios',c.model]].map(([l,v])=>`
        <div class="comp-kpi"><div class="comp-kpi-label">${l}</div><div class="comp-kpi-val">${v}</div></div>`).join('')}
    </div>
    <div class="vp-box">
      <div class="card-label">Propuesta de valor</div>
      <div class="vp-text">&ldquo;${c.vp}&rdquo;</div>
      <div class="wl-grid">
        <div>
          <div class="wl-label-green">WK gana cuando...</div>
          <div class="side-bar-green">${c.wkWins}</div>
        </div>
        <div>
          <div class="wl-label-red">WK pierde cuando...</div>
          <div class="side-bar-red">${c.wkLoses}</div>
        </div>
      </div>
    </div>`;
}

function renderFeatures() {
  const d = DATA[currentRegion];
  document.getElementById('tab-features').innerHTML = `
    <table>
      <thead><tr>
        <th>Feature</th>
        <th class="wk-col">WK</th>
        ${COMP_KEYS.map(k=>`<th>${COMP_LABELS[k]}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${d.features.map(row=>`<tr>
          <td>${row.feature}</td>
          <td>${scoreBadge(row.wk)}</td>
          ${COMP_KEYS.map(k=>`<td>${scoreBadge(row[k])}</td>`).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="legend">
      ${[5,4,3,2,1].map(s=>`<span class="legend-item"><span class="legend-dot" style="background:${SCORE_COLORS[s]}33;border-color:${SCORE_COLORS[s]}"></span>${s} — ${['','Muy débil','Débil','Moderado','Fuerte','Líder'][s]}</span>`).join('')}
    </div>`;
}

function renderStrategy() {
  const d = DATA[currentRegion];
  document.getElementById('tab-strategy').innerHTML = `
    <div class="threat-card">
      <div class="threat-title">Principales amenazas (12–18 meses)</div>
      ${d.threats.map((t,i)=>`<div class="list-item"><span class="num-badge num-red">${i+1}</span>${t}</div>`).join('')}
    </div>
    <div class="opp-card">
      <div class="opp-title">Oportunidades de crecimiento</div>
      ${d.opportunities.map((o,i)=>`<div class="list-item"><span class="num-badge num-green">${i+1}</span>${o}</div>`).join('')}
    </div>`;
}

function renderAll() {
  renderOverview();
  renderCompetitors();
  renderFeatures();
  renderStrategy();
}

// Init region buttons
const bar = document.getElementById('regionBar');
REGIONS.forEach(r => {
  const b = document.createElement('button');
  b.className = 'region-btn' + (r === currentRegion ? ' active' : '');
  b.dataset.r = r;
  b.textContent = r;
  b.onclick = () => setRegion(r);
  bar.appendChild(b);
});

updateKPIs();
renderAll();
</script>
</body>
</html>
